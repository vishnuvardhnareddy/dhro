<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" fill="#f5f7fa" rx="20" ry="20"/>
  
  <!-- Laptop -->
  <rect x="100" y="200" width="300" height="200" rx="10" ry="10" fill="#4361ee"/>
  <rect x="110" y="210" width="280" height="170" rx="5" ry="5" fill="white"/>
  
  <!-- Screen Content -->
  <rect x="130" y="230" width="240" height="30" rx="5" ry="5" fill="#e0e0e0"/>
  <rect x="130" y="270" width="240" height="10" rx="5" ry="5" fill="#e0e0e0"/>
  <rect x="130" y="290" width="240" height="10" rx="5" ry="5" fill="#e0e0e0"/>
  <rect x="130" y="310" width="180" height="10" rx="5" ry="5" fill="#e0e0e0"/>
  
  <!-- Multiple Choice Options -->
  <rect x="140" y="340" width="15" height="15" rx="3" ry="3" fill="#4361ee"/>
  <rect x="165" y="340" width="100" height="10" rx="3" ry="3" fill="#e0e0e0"/>
  
  <rect x="140" y="365" width="15" height="15" rx="3" ry="3" stroke="#4361ee" stroke-width="2" fill="transparent"/>
  <rect x="165" y="365" width="100" height="10" rx="3" ry="3" fill="#e0e0e0"/>
  
  <!-- Laptop Base -->
  <rect x="150" y="400" width="200" height="10" rx="5" ry="5" fill="#4361ee"/>
  
  <!-- Floating Elements -->
  <circle cx="400" cy="150" r="30" fill="#4cc9f0"/>
  <circle cx="80" cy="180" r="20" fill="#4361ee"/>
  <rect x="350" y="100" width="40" height="40" rx="5" ry="5" fill="#3f37c9"/>
  
  <!-- Clock Icon -->
  <circle cx="120" cy="120" r="25" fill="#f1f1f1" stroke="#4361ee" stroke-width="3"/>
  <line x1="120" y1="120" x2="120" y2="105" stroke="#4361ee" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="120" x2="130" y2="120" stroke="#4361ee" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Document Icon -->
  <rect x="350" y="300" width="30" height="40" rx="3" ry="3" fill="#f1f1f1" stroke="#4361ee" stroke-width="2"/>
  <line x1="360" y1="310" x2="370" y2="310" stroke="#4361ee" stroke-width="2"/>
  <line x1="360" y1="320" x2="370" y2="320" stroke="#4361ee" stroke-width="2"/>
  <line x1="360" y1="330" x2="370" y2="330" stroke="#4361ee" stroke-width="2"/>
</svg>
